plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // WebSocket + HTTP server (Jetty-backed) — room for REST matchmaking/auth later.
    implementation 'io.javalin:javalin:6.3.0'
    // JSON (de)serialization for the wire protocol.
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
    // Logging backend for Javalin/Jetty.
    implementation 'org.slf4j:slf4j-simple:2.0.13'

    // Tests: JUnit 5 + AssertJ.
    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.assertj:assertj-core:3.25.3'
    // Gradle 9 no longer adds this automatically to the test runtime classpath.
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'com.balatromp.engine.net.ServerMain'
}

test {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
}
